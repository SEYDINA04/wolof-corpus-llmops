name: CI

# OPTIONNEL — la CI par défaut de ce projet est LOCALE (pre-commit, voir
# .pre-commit-config.yaml et `make hooks`). Ce workflow n'est conservé que pour
# les comptes où GitHub Actions est activé ; il ne se déclenche QUE manuellement
# afin de ne pas générer de runs en échec.

on:
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (dev)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check pipeline

      - name: Tests (pytest)
        run: uv run pytest -q
