name: CI

# Intégration continue : à chaque push / pull request sur main,
# on vérifie le style (ruff) et on lance les tests unitaires (pytest).
# Les tests des quality gates tournent sur de petits DataFrames synthétiques
# -> rapides, pas besoin de télécharger les gros datasets.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (dev)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check pipeline

      - name: Tests (pytest)
        run: uv run pytest -q
